batch_size: 32
epochs: 10
learning_rate: 0.0003
weight_decay: 0.0001
num_workers: 4
mixed_precision: true
checkpoint_metric: roc_auc
early_stopping_patience: 3
optimizer: adamw
scheduler: cosine
min_learning_rate: 0.000001
warmup_epochs: 0
label_smoothing: 0.0
gradient_clip_norm: 1.0
use_pos_weight: true
log_interval: 10
