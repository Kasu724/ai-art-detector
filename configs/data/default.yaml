raw_dir: data/raw
interim_dir: data/interim
processed_dir: data/processed
manifest_path: data/processed/dataset_manifest.csv
summary_path: data/processed/preparation_summary.json
allowed_extensions:
  - .jpg
  - .jpeg
  - .png
  - .webp
label_map:
  human: 0
  ai: 1
positive_label: ai
split_ratios:
  train: 0.7
  val: 0.15
  test: 0.15
stratify_fields:
  - label_name
  - source
compute_sha256: true
skip_invalid_images: true
follow_symlinks: false
max_files: null
image_size: 224
resize_size: 256
normalization_mean:
  - 0.485
  - 0.456
  - 0.406
normalization_std:
  - 0.229
  - 0.224
  - 0.225
train_random_resized_crop_scale:
  - 0.8
  - 1.0
train_horizontal_flip_prob: 0.5
train_color_jitter:
  brightness: 0.1
  contrast: 0.1
  saturation: 0.1
  hue: 0.02
train_random_erasing_prob: 0.0
num_channels: 3
pin_memory: true
