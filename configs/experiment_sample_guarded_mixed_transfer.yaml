project:
  name: ai-art-detector
  experiment_name: sample_guarded_mixed_transfer_efficientnet_b0
  description: >
    Mixed-domain warm-start using the public real-art corpus plus a downloaded
    v4 fanart/Ghibli subset. The sample folder is benchmark-only.

defaults:
  data: improved
  model: improved
  train: sample_guarded_mixed_transfer
  eval: default
  runtime: default

data:
  raw_dir: data/raw
  manifest_path: data/processed/sample_guarded_mixed_manifest.csv
  summary_path: data/processed/sample_guarded_mixed_summary.json

model:
  checkpoint_path: artifacts/training/20260422_223526_anime_fanart_v4_recall_efficientnet_b0/checkpoints/best.pt

notes: >
  The combined manifest is generated from real_art_hf_manifest.csv and
  anime_fanart_v4_manifest.csv. It excludes sample/ and preserves each source's
  existing split assignments.
