project:
  name: ai-art-detector
  experiment_name: real_art_hf_efficientnet_b0
  description: >
    Comparison variant on the public Hugging Face AI-vs-real art dataset using
    EfficientNet-B0 and stronger augmentations.

defaults:
  data: improved
  model: improved
  train: real_art_hf_improved
  eval: default
  runtime: default

data:
  raw_dir: data/raw/hf_art_images_ai_and_real
  manifest_path: data/processed/real_art_hf_manifest.csv
  summary_path: data/processed/real_art_hf_preparation_summary.json

notes: >
  Uses the same prepared real-art manifest as the baseline, but swaps in the
  improved augmentation recipe and an EfficientNet-B0 backbone for a fair
  same-data comparison.
