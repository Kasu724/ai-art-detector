project:
  name: ai-art-detector
  experiment_name: sample_guarded_mixed_resnet18
  description: >
    ResNet18 ImageNet fine-tune on the mixed public manifest. The sample folder
    is benchmark-only.

defaults:
  data: improved
  model: baseline
  train: sample_guarded_mixed_resnet18
  eval: default
  runtime: default

data:
  raw_dir: data/raw
  manifest_path: data/processed/sample_guarded_mixed_manifest.csv
  summary_path: data/processed/sample_guarded_mixed_summary.json

notes: >
  Trains ResNet18 from ImageNet weights on the mixed manifest. It excludes
  sample/ from all data inputs.
