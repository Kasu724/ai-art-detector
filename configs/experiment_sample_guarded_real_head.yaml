project:
  name: ai-art-detector
  experiment_name: sample_guarded_real_art_head_efficientnet_b0
  description: >
    Conservative head-only warm-start on the public real-art corpus. The
    sample folder is reserved for post-training benchmarking only.

defaults:
  data: improved
  model: improved
  train: sample_guarded_real_head
  eval: default
  runtime: default

data:
  raw_dir: data/raw/hf_art_images_ai_and_real
  manifest_path: data/processed/real_art_hf_manifest.csv
  summary_path: data/processed/real_art_hf_preparation_summary.json

model:
  checkpoint_path: artifacts/training/20260422_223526_anime_fanart_v4_recall_efficientnet_b0/checkpoints/best.pt
  freeze_backbone: true

notes: >
  Fine-tunes only the classifier head from the existing v4 detector. This is
  intended as a low-risk update that keeps sample/ out of training data.
