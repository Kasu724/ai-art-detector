project:
  name: ai-art-detector
  experiment_name: anime_fanart_v4_recall_efficientnet_b0
  description: >
    AI-recall-focused fanart moderation model with curated human fanart,
    OpenNiji AI art, and auxiliary AI-generated Ghibli-style sources.

defaults:
  data: anime_fanart_v4
  model: improved
  train: anime_fanart_v4_transfer
  eval: ai_recall
  runtime: default

model:
  checkpoint_path: artifacts/training/20260422_174107_anime_fanart_v3_transfer_efficientnet_b0/checkpoints/best.pt

notes: >
  Fourth-stage fine-tune from the balanced v3 checkpoint. This variant is
  intended for moderation workflows where missing AI-generated art is more
  costly than sending borderline human art to review.
